# parity/parity.yml — the acceptance-oracle dashboard (design-spec SS6 gate 5; A-16 depth schema)
#
# SEMANTICS (spec SS6, canonical plan SS11b A-16 -- binding):
#   * status: pending | ported.
#       pending -> the subsystem's goldens are expected-red; it is REPORTED by the
#                  golden-parity gate, never failing. Every subsystem is born pending.
#       ported  -> its goldens MUST replay green (hard failure on any regression).
#   * ONE-WAY DOOR: ported -> pending is rejected by the gate (green is a one-way door).
#   * Flipping pending -> ported is the port PR's deliberate LAST commit, and requires
#     the A-16 depth floor (below).
#
# DEPTH SCHEMA (A-16 -- present from birth, enforced by check_parity_depth inside the
# golden-parity gate; DB-free -- reads golden JSON + manifest.snapshot.json + this file):
#   depth.declared.{events,tables,settings}: manifest-declared surface counts. null until
#     the subsystem's manifest compiles (the manifest is the denominator-setter -- exact,
#     never heuristic). MUST be non-null at the pending -> ported flip.
#   depth.covered.{events,tables,settings}: surfaces exercised by >= 1 golden.
#   depth.exempt: per-surface exemption rows: {surface: "<kind>:<id>", reason: "<class>: ..."}.
#     Reason must start with an allowed reason class (below) -- never a bare "flaky".
#   FLOOR AT THE FLIP: covered + exempt == declared for every kind (100%-or-exempt).
#   COUNT-RATCHET AFTER THE FLIP: covered counts never decrease; newly declared surfaces
#     arrive covered-or-exempt in the same PR.
#
# ALLOWED EXEMPT REASON CLASSES (draft set -- phase 2 aligns these with the old repo's
# parity/goldens/_sweep_skips.json / COVERAGE.md reason classes; DECISIONS.md D-14):
#   requires-live-discord | nondeterministic-external | deprecated-surface | owner-exempt
#
# GOLDENS never live in this repo: see parity/goldens-source.lock (pinned read-only
# external oracle, menno420/superbot). Import of the harness itself = plan SS5 step 11.
# This file doubles as the owner's live port-progress dashboard.
