name: Code Quality

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  # Manual/automated re-kick (Q-0195): ci-rerun-watchdog.yml dispatches this on a claude/* branch
  # when GitHub dropped the pull_request:synchronize event and the head got no run. The docs-detector
  # below treats a dispatch (no PR base) as "base unavailable -> run full CI". Whether the resulting
  # dispatched `code-quality` run *satisfies the required status check* for the PR is UNVERIFIED (it
  # may differ by trigger event); check_ci_coverage.py no longer assumes it does — a completed
  # dispatch that produces no pull_request/push run escalates to an owner-alert issue instead of
  # silently marking the head "covered" (self-silencing fix, PR #1737 §C.3 Mode 2).
  workflow_dispatch:

# Concurrency: do NOT cancel in-progress runs.
#
# History: `cancel-in-progress: true` (non-main refs) was added 2026-06-20 (#1195, Q-0126) to save
# minutes — agents push several times to a PR branch and only the newest commit "needs" checking.
# But it caused the recurring "CI didn't run on my latest commit" strand: under the born-red flow's
# rapid event burst (open → push → push within ~2 min), GitHub's cancellation RACES and drops the
# run for the *head* commit, leaving the PR with no passing required check (auto-merge then stalls).
# Smoking gun (2026-06-22): on the SAME `pull_request: synchronize` event/commit, `codex-final-review`
# (`cancel-in-progress: false`) ran while `code-quality` (`cancel-in-progress: true`) did NOT — the
# only difference was this flag. And the cost rationale is moot: this is a PUBLIC repo with UNLIMITED
# Actions minutes, so cancelling to save minutes buys nothing and costs reliability.
# => `false`: every commit reliably gets its run. Redundant older-commit runs are harmless (free).
concurrency:
  group: code-quality-${{ github.ref }}
  cancel-in-progress: false

jobs:
  code-quality:            # <- clear job name
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          # Full history so the docs-only detector can diff against the base.
          fetch-depth: 0

      # Skip the expensive lint/type/test steps when ONLY docs/markdown changed.
      # The job still runs and reports success, so a required `code-quality`
      # status check is satisfied and docs-only PRs stay mergeable (a workflow
      # skipped via `paths-ignore` would never report and would block merges).
      # Pure shell — no third-party change-detection action (no supply-chain surface).
      - name: Detect non-docs changes
        id: changes
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE='${{ github.event.pull_request.base.sha }}'
            HEAD='${{ github.event.pull_request.head.sha }}'
          else
            BASE='${{ github.event.before }}'
            HEAD='${{ github.sha }}'
          fi
          # Base missing/unknown (new branch, force-push, all-zero SHA) -> run full CI.
          if [ -z "$BASE" ] || ! git cat-file -e "${BASE}^{commit}" 2>/dev/null; then
            echo "Base commit unavailable — running full CI."
            echo "code=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          FILES="$(git diff --name-only "$BASE" "$HEAD")"
          echo "Changed files:"
          printf '%s\n' "$FILES"
          if [ -z "$FILES" ]; then
            echo "No file changes — skipping heavy steps."
            echo "code=false" >> "$GITHUB_OUTPUT"
          elif printf '%s\n' "$FILES" | grep -qvE '(\.md$|^docs/|^\.session-journal\.md$)'; then
            echo "Non-docs changes present — running full CI."
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "Docs-only change — skipping lint/type/test steps."
            echo "code=false" >> "$GITHUB_OUTPUT"
          fi

      # Doc-hygiene gate — runs on EVERY PR (incl. docs-only), pure stdlib so it
      # needs no setup. Hard-fails on missing/invalid Status badges, dead doc
      # links, and broken read-path references. See scripts/check_docs.py.
      - name: Run doc hygiene (check_docs)
        run: python3 scripts/check_docs.py --strict

      # Tool-pin drift is a HARD gate (CI-setup redesign PR #1739, decision G4). The pins must match
      # across code-quality.yml / requirements-dev.txt / .pre-commit-config.yaml (CLAUDE.md rule #3); a
      # Dependabot bump of one alone silently desynced them and reached main (#1315). tool-pins.yml runs
      # this too, but as a non-required workflow it only showed red — this step makes it BLOCK. Pure
      # stdlib, runs on every PR (incl. docs-only). Disposable (Q-0105): drop this step if it misfires.
      - name: Tool-pin drift (check_tool_pins)
        run: python3 scripts/check_tool_pins.py

      # Merge-relevant workflows must never cancel a head run (the #1275 cancellation race). A HARD gate
      # (CI-setup redesign PR #1739, decision G4): a future workflow shipping `cancel-in-progress: true`
      # (or the expression form that cancels on PR refs) would silently re-open the race, and a warn-only
      # check can't prevent that. Pure stdlib YAML parse over .github/workflows/, ~0 FP. Disposable
      # (Q-0105): drop this step + scripts/check_workflow_concurrency.py if it ever misfires.
      - name: Workflow concurrency guard (check_workflow_concurrency)
        run: python3 scripts/check_workflow_concurrency.py

      # Stale-claim surfacing (owner decision Q-0206, option 2). WARN-ONLY:
      # surfaces any orphan claim file in docs/owner/claims/ (a session that
      # forgot to delete its own claim at close) so it doesn't linger across
      # reconciliation passes. continue-on-error => never blocks a merge; the
      # reconciliation pass (Q-0195) is still the actuator that --prunes.
      # UNVERIFIED (Q-0105) — delete this step if it proves noisy.
      - name: Surface stale claim files (advisory)
        continue-on-error: true
        run: python3 scripts/check_stale_claims.py --strict

      # Born-red session merge-gate (owner directive Q-0133). On a PR, if this
      # session ADDED a `.sessions/` card, the merge is HELD until that card's
      # `> **Status:**` badge is a ready token (`complete`). The card is created
      # in the first commit with `in-progress` (PR born red, so native auto-merge
      # arms but cannot fire on a partial PR — the #843 race), then flipped to
      # `complete` as the deliberate final step. A PR that adds no card is NOT
      # gated (workflow-authored / non-adopting routine PRs are never deadlocked).
      # Pure stdlib; see scripts/check_session_gate.py. UNVERIFIED (Q-0105) —
      # delete this step + the script if it ever holds a PR it shouldn't.
      - name: Session merge-gate (check_session_gate)
        if: github.event_name == 'pull_request'
        run: |
          python3 scripts/check_session_gate.py \
            --base '${{ github.event.pull_request.base.sha }}' \
            --head '${{ github.event.pull_request.head.sha }}'

      - name: Set up Python
        if: steps.changes.outputs.code == 'true'
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.10"
          # Cache pip's download cache so the pinned tools + requirements.txt aren't
          # re-downloaded every run. Keyed on the dep files; a version bump there
          # invalidates it. Provenance Q-0126 (2026-06-14).
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        if: steps.changes.outputs.code == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install ruff==0.15.20 mypy==2.1.0
          pip install pytest==9.1.1 pytest-asyncio==1.4.0 pytest-xdist==3.8.0
          pip install -r requirements.txt

      # ruff replaced black + isort (A3, 2026-07-06): `ruff format` owns formatting
      # (Black-compatible) and `ruff check` owns import sorting (the `I` rule) + lint.
      # 5 python-gate tools → 3. Same --exclude scope as before (mirrored in check_quality.py).
      - name: Run Ruff format (check only)
        if: steps.changes.outputs.code == 'true'
        run: ruff format --check . --exclude .github,tests,venv,env,build,dist

      - name: Run Ruff (lint + import sort)
        if: steps.changes.outputs.code == 'true'
        run: ruff check . --exclude .github,tests,venv,env,build,dist

      # UX/interaction consistency linter (Q-0170). Only the GRADUATED rules are
      # CI-enforced: `--mode strict` exits 1 on an *error*-severity finding
      # (back_button / panel_base_class / select_option_truncation), while
      # warn-only rules (edit_in_place) still just print. AST-only over
      # disbot/views/; needs PyYAML (from requirements.txt), so it runs in the
      # deps-installed block. Disposable (Q-0105): if a graduated rule proves
      # noisy, flip its `Rule.severity` back to "warning" in check_consistency.py.
      - name: Run consistency linter (graduated rules)
        if: steps.changes.outputs.code == 'true'
        run: python scripts/check_consistency.py --mode strict

      # Architecture layer-boundary invariants are now a HARD gate (CI-setup redesign PR #1739,
      # decision G4). This was the #1 coverage gap: `check_architecture --mode strict` ran only on the
      # local Stop hook, so a layer violation (e.g. a new services/ -> views/ import — the zero-tolerance
      # rule) could reach main whenever the hook was skipped. `--mode strict` exits 1 only on a NEW
      # (non-allowlisted) *error*; known violations tracked in architecture_rules/ YAML pass, and warnings
      # never fail (verified green on main). Needs PyYAML (from requirements.txt), so it runs in the
      # deps-installed block; the code-only gate is correct (architecture only matters when code changed).
      # Disposable (Q-0105): drop this step if it ever false-blocks.
      - name: Architecture layer boundaries (check_architecture)
        if: steps.changes.outputs.code == 'true'
        run: python scripts/check_architecture.py --mode strict

      # Audit-seam coverage — ADVISORY (continue-on-error, never blocks a merge). Flags a function
      # that performs a state-mutation write signal (raw SQL / Discord state mutation / an
      # auditable-domain utils.db write) but never reaches services.audit_events.emit_audit_action —
      # the #1728 "save-fixes" bug class (bug #5 raid-lockdown channel.edit; bug #6 an unaudited
      # settings/roles db write). Warn-first + architecture_rules/audit_seam_exceptions.yml allowlist;
      # would-have-caught 3 of the 8 #1728 bugs. Needs PyYAML (from requirements.txt), so it runs in
      # the deps-installed block; code-gated (audit-seam only matters when code changed). Promotion to
      # a hard gate is owner-gated (Q-0239 G4) after a clean band. Disposable (Q-0105): drop this step
      # + scripts/check_audit_seam.py if it proves noisy across sessions.
      - name: Audit-seam coverage (check_audit_seam · advisory)
        if: steps.changes.outputs.code == 'true'
        continue-on-error: true
        run: python scripts/check_audit_seam.py --mode strict

      - name: Cache mypy incremental cache
        if: steps.changes.outputs.code == 'true'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .mypy_cache
          # Exact key per disbot tree state; restore-keys falls back to the most recent
          # cache so mypy re-checks only changed modules instead of all of disbot/.
          # mypy validates its own cache, so a stale restore is safe. Provenance Q-0126.
          key: mypy-${{ runner.os }}-py3.10-${{ hashFiles('disbot/**/*.py') }}
          restore-keys: |
            mypy-${{ runner.os }}-py3.10-

      - name: Run mypy
        if: steps.changes.outputs.code == 'true'
        run: mypy disbot/

      - name: Run pytest
        if: steps.changes.outputs.code == 'true'
        # pytest is the dominant per-run cost (was ~109s serial for the 9.4k-test
        # suite). `-n auto` (pytest-xdist) spreads it across the runner's cores for a
        # ~3x speedup (~35s on the 4-core runner). This was tried + reverted once under
        # Q-0126 (2026-06-14) because the suite had non-deterministic cross-test
        # global-state pollution that only surfaced in parallel (a different subset
        # failed each run). That was root-fixed in the Q-0126 follow-up: autouse reset
        # of the lifecycle / startup-outcome / feature-flag singletons in
        # tests/conftest.py + the server_logging bus-subscription teardown. Proven
        # green across 8 parallel runs (5x --dist loadscope + 3x -n auto). Keep `-n
        # auto` in lockstep with scripts/check_quality.py's run_pytest().
        run: pytest tests/ -v -n auto --tb=short

      - name: Docs-only change — heavy checks skipped
        if: steps.changes.outputs.code != 'true'
        run: echo "Only docs/markdown changed — ruff/mypy/pytest were skipped."
