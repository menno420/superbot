name: AI Evals (manual)

# Manually-triggered OpenAI-vs-Claude capability comparison.
#
# Requires two repository secrets (Settings -> Secrets and variables ->
# Actions -> New repository secret):
#   * OPENAI_API_KEY
#   * ANTHROPIC_API_KEY
#
# Makes real, paid API calls — it runs ONLY when you press "Run workflow",
# never on push or pull_request. The scorecard prints to the run log and to
# the run Summary page. The job stays green regardless of the pass rate;
# read the scorecard for the actual result.

on:
  workflow_dispatch:
    inputs:
      provider:
        description: Provider(s) to compare
        type: choice
        options:
          - both
          - openai
          - anthropic
        default: both
      suite:
        description: Which cases to run
        type: choice
        options:
          - golden          # the standard capability golden set
          - btd6            # ONLY the BTD6 QA-accuracy corpus (real grounding)
          - golden+btd6     # both
        default: golden+btd6
      threshold:
        description: Pass-rate threshold (0-1), informational only
        type: string
        default: "0.8"

jobs:
  evals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run evals
        env:
          RUN_EVALS: "1"
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PROVIDER: ${{ inputs.provider }}
          SUITE: ${{ inputs.suite }}
          THRESHOLD: ${{ inputs.threshold }}
        run: |
          # Map the suite picker → run_evals flags. The BTD6 corpus replays the
          # REAL production answer path (router → grounding → instruction stack →
          # gateway → faithfulness guard), so its result is the live answer. It
          # tests the provider in AI_DEFAULT_PROVIDER; the golden set's LLM judge
          # also keys off it, so default it to Claude for grading consistency and
          # only switch it when running the BTD6 suite alone against one provider.
          SUITE_FLAGS=""
          DEFAULT_PROVIDER="anthropic"
          case "$SUITE" in
            btd6)
              SUITE_FLAGS="--btd6-only"
              [ "$PROVIDER" != "both" ] && DEFAULT_PROVIDER="$PROVIDER"
              ;;
            golden+btd6) SUITE_FLAGS="--btd6" ;;
            *)           SUITE_FLAGS="" ;;   # golden only
          esac
          export AI_DEFAULT_PROVIDER="$DEFAULT_PROVIDER"
          {
            echo "### AI eval scorecard (suite: ${SUITE}; BTD6 live provider: ${DEFAULT_PROVIDER})"
            echo ''
            echo '```text'
            python scripts/run_evals.py --provider "$PROVIDER" --threshold "$THRESHOLD" $SUITE_FLAGS || true
            echo '```'
          } | tee -a "$GITHUB_STEP_SUMMARY"
