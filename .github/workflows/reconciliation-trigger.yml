name: reconciliation-trigger

# Owner directive Q-0107 (cadence raised 10 → 20 on 2026-06-12, then 20 → 30 on 2026-06-14
# per Q-0134): when merged PRs cross a 30-PR band, open a `reconcile` issue that fires the
# "superbot docs reconciliation" routine. This runs the docs/planning pass PROMPTLY (daytime
# included) so the docs are fresh for the next dispatch run — not deferred to a nightly poll.
# The firing boundary AND the issue-body copy are both owned by
# scripts/check_reconciliation_due.py (STEP = 30, `--issue-body`): this workflow echoes the
# checker's body rather than carrying its own string, so the copy can never drift (BUG-0016).
#
# Provenance + reliability (Q-0105): added 2026-06-12. UNVERIFIED — confirm over a few cycles
# that it opens the issue only at the boundary and dedupes. Delete this workflow if it
# misfires repeatedly; it is a convenience trigger, not load-bearing runtime.

on:
  push:
    branches: [main]

permissions:
  contents: read
  issues: write

concurrency:
  group: reconciliation-trigger
  cancel-in-progress: false

jobs:
  maybe-open-reconcile-issue:
    # Never run on forks — this opens issues against the canonical repo only.
    if: github.repository == 'menno420/superbot'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0 # full history so the cadence guard can scan merge subjects
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.10"
      - name: Is a reconciliation pass due?
        id: due
        run: |
          # --strict exits 1 when a pass is due. (An if-condition is exempt from set -e.)
          if python3.10 scripts/check_reconciliation_due.py --strict; then
            echo "due=false" >> "$GITHUB_OUTPUT"
          else
            echo "due=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Open a reconcile issue (deduped)
        if: steps.due.outputs.due == 'true'
        env:
          # Author the issue with a NON-default token — see executor-nightly.yml for the full
          # rationale. A github-actions[bot]-authored issue does NOT start the Claude docs-
          # reconciliation routine (verified 2026-06-13 via issue #776 vs #768). ROUTINE_PAT is a
          # fine-grained PAT (this repo, Issues: read/write); the GITHUB_TOKEN fallback only
          # avoids a hard failure when the secret is unset (the routine will not fire while unset).
          GH_TOKEN: ${{ secrets.ROUTINE_PAT || secrets.GITHUB_TOKEN }}
          ROUTINE_PAT_SET: ${{ secrets.ROUTINE_PAT != '' }}
        run: |
          # Loud, non-fatal warning if the PAT is missing — otherwise the issue is bot-authored
          # and the routine silently never fires (the exact failure this token change fixes).
          if [ "$ROUTINE_PAT_SET" != "true" ]; then
            echo "::warning::ROUTINE_PAT is not set — the issue will be authored by github-actions[bot], which does NOT start the Claude routine. Add ROUTINE_PAT (fine-grained PAT, this repo, Issues: read/write) to enable autonomous firing."
          fi
          # Dedupe: if an open `reconcile` issue already exists, do nothing (avoids a new
          # issue on every push between the boundary crossing and the routine running).
          open_count="$(gh issue list --label reconcile --state open --json number --jq 'length' 2>/dev/null || echo 0)"
          if [ "${open_count:-0}" != "0" ]; then
            echo "An open 'reconcile' issue already exists — nothing to do."
            exit 0
          fi
          gh label create reconcile --color FBCA04 \
            --description "Fires the docs-reconciliation routine (Q-0107)" --force 2>/dev/null || true
          # Echo the body from the cadence checker so the human-readable copy can never
          # drift from the live cadence again (BUG-0016 was exactly that drift). STEP=30
          # lives in exactly one place: scripts/check_reconciliation_due.py.
          gh issue create \
            --title "Docs reconciliation due (Q-0107)" \
            --label reconcile \
            --body "$(python3.10 scripts/check_reconciliation_due.py --issue-body)"
