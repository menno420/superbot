name: CodeQL

# Static analysis (SAST) for the Python tree. Provenance: owner-greenlit in-session
# 2026-06-19 (Q-0177), part of the repo governance/supply-chain baseline. Findings are
# published to the repo's Security → Code scanning tab; this workflow is NOT a required
# merge check (making it one is an owner repo-Settings step — see the plan). Action
# versions are major-tag pinned to match the repo convention (checkout@v5); SHA-pinning
# is a tracked hardening follow-up. Free for public repositories.

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "23 3 * * 1" # weekly, Monday 03:23 UTC

# Never cancel a head run. CodeQL is slated to become a required merge gate (the CodeQL
# merge-protection ruleset — redesign §C.2 / router Q-0238 option (C)); cancelling on a PR ref would
# drop the head-commit run the gate depends on (the #1275 cancellation-race class that code-quality.yml
# already guards against). Public repo => unlimited Actions minutes, so the redundant older runs this
# leaves are free. Invariant enforced by scripts/check_workflow_concurrency.py (a required step in
# code-quality.yml). Provenance: CI-setup redesign PR #1737 (A1) / Phase-A PR #1739.
concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: false

jobs:
  analyze:
    name: Analyze (python)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4
        with:
          languages: python
          # 'security-extended' adds more security queries than the default set without
          # the maintainability/quality noise. Dial to 'default' if it is too chatty, or
          # to 'security-and-quality' for the full set.
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          category: "/language:python"
