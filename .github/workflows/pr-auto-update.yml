name: pr-auto-update

# Keep open claude/* PRs current with main by merging main into behind branches.
#
# CORRECTION (2026-06-21, owner-confirmed via the branch-protection screenshot): the `main` rule has
# "Require branches to be up to date before merging" **OFF**. So — contrary to this header's original
# claim — a behind-but-clean PR is NOT blocked from merging; native auto-merge fires on a green
# `code-quality` regardless of how far behind the branch is. This workflow is therefore NOT required
# for behind PRs to merge. Its real, still-useful value now is: (1) re-testing each PR against current
# main so a *semantic* conflict (textually-clean but breaks together) surfaces before merge, and
# (2) the update-branch push forces GitHub to recompute mergeability, which clears a STUCK false-`dirty`
# (GitHub's async mergeability can wrongly report `dirty` for a branch git merges cleanly — see
# `.session-journal.md`). A branch that CANNOT be cleanly updated (a real conflict) fails update-branch
# and is left for `pr-conflict-guard.yml` to flag RED.
#
# Scope note: only `claude/*` PRs. `bot/*` (e.g. dashboard-refresh) is excluded — its own workflow
# rebuilds its branch on current main, which is the correct merge strategy for a generated file
# (a 3-way merge of two regenerations just conflicts).
#
# This is the "behind = handled silently; conflict = loud red" half of the owner's intent
# (Q-0154, 2026-06-16): a behind/conflicted PR must never rot unnoticed (the #959 stall that
# surfaced this — 12 PRs merged during the work and the branch sat behind+green).
#
# REQUIREMENTS: ROUTINE_PAT with Pull requests: Read/Write AND Contents: Read/Write (the same
# token auto-merge-enabler.yml already needs). The PAT (not GITHUB_TOKEN) keeps the eventual
# merge attributed to a real user so reconciliation-trigger.yml (on: push to main) keeps firing.
#
# Provenance + reliability (Q-0105): added 2026-06-16, owner-directed. Delete this workflow if it
# misfires; updating a branch is always doable by hand ("Update branch" button).
#
# 2026-06-20 fix: the original selected PRs with `mergeStateStatus == "BEHIND"`. That is GitHub's
# ASYNC mergeability field, which is UNKNOWN for every open PR in the seconds right after a
# push:main (the query is what triggers recomputation — the documented #1104 behavior in
# pr-conflict-guard.yml). This job runs on push:main and queries IMMEDIATELY with no wait (observed
# job runtime ~1s), so a PR made freshly-behind by the triggering merge was still UNKNOWN, failed
# the `== "BEHIND"` filter, and was silently skipped — the branch then sat behind+green (the #959
# stall this workflow exists to prevent). Now we compute "behind" DETERMINISTICALLY with git:
# a PR is behind iff current main is NOT an ancestor of its head. No async field, no race.
# Validated locally on git 2.43.0 (is-ancestor TRUE => up-to-date, FALSE => behind).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pr-auto-update
  cancel-in-progress: false

jobs:
  update-behind:
    if: github.repository == 'menno420/superbot'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main (full history — git ancestry test needs the graph)
        uses: actions/checkout@v7.0.1
        with:
          fetch-depth: 0
      - name: Update BEHIND claude/* PRs against main
        env:
          GH_TOKEN: ${{ secrets.ROUTINE_PAT || secrets.GITHUB_TOKEN }}
        run: |
          set -uo pipefail
          mainSha=$(git rev-parse HEAD)   # the just-pushed main tip

          # Open, non-draft, non-carved claude/* PRs (do-not-automerge is left alone). NOTE: we
          # deliberately do NOT filter on mergeStateStatus — that async field is UNKNOWN right
          # after push:main (see header), which silently skipped freshly-behind PRs. We classify
          # behind-ness ourselves with git below.
          nums=$(gh pr list --repo "$GITHUB_REPOSITORY" --state open --base main \
            --json number,headRefName,isDraft,labels \
            --jq '.[]
                  | select(.headRefName | startswith("claude/"))
                  | select(.isDraft | not)
                  | select([.labels[].name]
                           | contains(["do-not-automerge"])
                           | not)
                  | .number')
          if [ -z "$nums" ]; then
            echo "No open claude/* PRs to consider."
            exit 0
          fi
          for n in $nums; do
            # Deterministic behind test: behind iff current main is NOT an ancestor of the PR head
            # (head is missing commits that are on main). If main IS an ancestor, the PR already
            # contains main — nothing to update.
            if ! git fetch --quiet --no-tags origin "refs/pull/$n/head" 2>/dev/null; then
              echo "::warning::#$n head fetch failed -> skip"; continue
            fi
            headSha=$(git rev-parse --verify --quiet FETCH_HEAD) || { echo "#$n rev-parse failed -> skip"; continue; }
            # Behind-ness from the shared, unit-tested helper (one source of truth with the conflict
            # guard): BEHIND only when main has commits the head lacks. CURRENT/UNKNOWN => skip.
            if [ "$(python3 scripts/git_merge_state.py behind "$mainSha" "$headSha")" != "BEHIND" ]; then
              echo "#$n not behind main -> skip"
              continue
            fi
            # Behind (or diverged). update-branch merges main in; it succeeds only if the merge is
            # clean. A real conflict fails here and is left for pr-conflict-guard.yml to flag RED.
            if gh api -X PUT "repos/$GITHUB_REPOSITORY/pulls/$n/update-branch" \
                 -H "Accept: application/vnd.github+json" >/dev/null 2>&1; then
              echo "Updated #$n against main (it will re-test, then auto-merge on green)."
            else
              echo "::warning::Could not update #$n — likely a real conflict; pr-conflict-guard will flag it RED."
            fi
          done
