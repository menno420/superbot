# ---------- PYTEST ----------
[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]

# ---------- RUFF ----------
[tool.ruff]
target-version = "py310"
line-length = 88
src = ["disbot"]
# Mirror the `--exclude` flag CI uses so local and CI agree on scope.
# Tests use pytest assert and ad-hoc imports that the strict ruleset
# would flag; they have their own conventions enforced by review.
extend-exclude = [".github", "tests", "venv", "env", "build", "dist"]

[tool.ruff.lint]
# Rules are split into two tiers:
#   select  — what we want enforced eventually.
#   ignore  — what current code cannot meet yet; tighten in later phases.
# Rationale for every ignore is documented in plan §17 (INV-* invariants)
# and §26 (regression prevention). Tightening these is feature work.
select = [
    "E", "W", "F",      # pycodestyle + pyflakes — basic correctness
    "B",                # bugbear — real bugs
    "A",                # builtins shadowing — real bugs
    "T20",              # no print() — observability
    "ERA",              # no commented-out code
    "COM",              # trailing-comma consistency
    "Q",                # quote consistency
    "ISC",              # implicit string concatenation
    "G",                # logging format
    "UP",               # modern syntax
    "PT",               # pytest style
    "RET",              # return style
    "SIM",              # simplify
    "ARG",              # unused arguments
    "C90",              # mccabe complexity
    "N",                # naming
    "S",                # security (bandit)
    "D",                # docstrings (pydocstyle)
    "ANN",              # type annotations
    "DTZ003",           # no bare datetime.utcnow() — INV-N
]
ignore = [
    # Pydocstyle layout knobs that conflict with the google convention.
    "D203", "D213",
    # ─── Aspirational rules grandfathered for the current codebase ───
    # Tightening these is its own phase; see plan §26.
    "D100",  # missing module docstring               — ~40 sites
    "D101",  # missing class docstring                — ~30 sites
    "D102",  # missing public-method docstring        — ~165 sites
    "D103",  # missing function docstring             — ~90 sites
    "D104",  # missing public-package docstring       — empty __init__.py files
    "D107",  # missing __init__ docstring             — ~45 sites
    "D105",  # missing docstring in magic method     — stylistic
    "D200",  # one-line docstring on one line         — stylistic
    "D205",  # blank line after summary               — stylistic
    "D212",  # multi-line summary on first line       — conflicts with D213
    "D415",  # docstring first-line punctuation       — stylistic
    "ANN001", # missing function-argument annotation  — ~227 sites
    "ANN002", # missing *args annotation              — common in Discord callbacks
    "ANN003", # missing **kwargs annotation           — same
    "ANN201", # missing public-function return type   — ~225 sites
    "ANN202", # missing private-function return type  — ~156 sites
    "ANN204", # missing __init__/__new__ return type  — ~90 sites
    "ANN205", # missing staticmethod return type      — same family
    "ANN401", # disallow Any                          — too strict for codebase
    "E501",   # line too long                         — black handles wrap; remainder are strings
    "C901",   # complex function                      — Phase D will split god-cogs
    "S110",   # try/except/pass                       — many intentional in lifecycle/teardown paths
    "S311",   # random not cryptographic              — false-positive for games
    "S105",   # hardcoded password string             — false-positive on settings-key constants
    "S608",   # possible SQL injection                — current code uses parameterised queries; verify case-by-case
    "S104",   # binding to 0.0.0.0                    — intentional for healthserver in container
    "S606",   # process without shell                 — intentional for !restart admin command
    "G004",   # logging f-string                      — stylistic
    "G201",   # logging exc_info=True                 — stylistic
    "SIM105", # use contextlib.suppress               — often less readable
    "SIM102", # combine nested ifs                    — often less readable
    "ARG001", # unused function arg                   — common in Discord button callbacks
    "ARG002", # unused method arg                     — same
    "N806",   # variable in function should be lowercase — false positive on type aliases
    "RET503", # missing explicit return None          — discord.py callbacks often early-return
]

[tool.ruff.lint.per-file-ignores]
# CLI scripts: print() is intentional output, subprocess uses hardcoded
# trusted commands, and AST visitor naming follows the ast module convention.
"scripts/*.py" = ["T201", "S603", "S607", "N815", "S310"]
# Dev tooling scripts: same rationale as scripts/ — CLI output + trusted subprocess.
"tools/**/*.py" = ["T201", "S603", "S607"]
# botsite SPA data generator: runnable as a CLI (python3.10 -m botsite.site_data),
# so its print() confirmation is intentional output — same rationale as scripts/.
"botsite/site_data.py" = ["T201"]
# Parity-harness CLI (python3.10 -m parity.run): print() is its output.
"parity/**/*.py" = ["T201"]

[tool.ruff.lint.mccabe]
max-complexity = 8

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.flake8-quotes]
inline-quotes = "double"
multiline-quotes = "double"
docstring-quotes = "double"

# ---------- BLACK ----------
[tool.black]
line-length = 88
target-version = ["py310"]

# ---------- ISORT ----------
[tool.isort]
profile = "black"
line_length = 88
src_paths = ["disbot"]

# ---------- MYPY ----------
[tool.mypy]
python_version = "3.10"
ignore_missing_imports = true      # discord.py / asyncpg have no bundled stubs
allow_untyped_defs = true          # codebase lacks full annotations
check_untyped_defs = true          # but still type-check their bodies (Phase B)
strict_optional = false
explicit_package_bases = true      # avoid duplicate-module errors under disbot/
# discord.py uses metaclass kwargs (title=, name=) that mypy can't see through
disable_error_code = ["call-arg", "index", "call-overload"]
exclude = ["^\\.github/", "^tests/", "^venv/", "^env/", "^build/", "^dist/"]
