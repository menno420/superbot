# ---------- PYTEST ----------
[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]

# ---------- RUFF (ultra strict) ----------
[tool.ruff]
# Match prod env on PythonAnywhere
target-version = "py310"
line-length = 88

# Let Ruff resolve your package correctly
src = ["superbot/src"]

# Never lint/read these reference projects (they're read-only)
extend-exclude = [
  "disbot/",
  "minebot/",
  "superbot-start/",
]

# Rules live under the "lint" table on modern Ruff
[tool.ruff.lint]
select = [
    "E", "W", "F",      # pycodestyle + pyflakes
    "C90",              # mccabe complexity
    "N",                # naming
    "D",                # docstrings (pydocstyle)
    "B",                # bugbear
    "A",                # builtins shadowing
    "ANN",              # annotations required
    "S",                # security (bandit)
    "T20",              # no print()
    "ERA",              # no commented-out code
    "COM",              # commas
    "Q",                # quotes consistency
    "ISC",              # implicit str concat
    "G",                # logging format
    "UP",               # modern syntax
    "PT",               # pytest style (for later)
    "RET",              # returns
    "SIM",              # simplify
    "ARG"               # unused arguments
]
# Relax two fussy docstring layout rules
ignore = ["D203", "D213"]

[tool.ruff.lint.mccabe]
max-complexity = 8

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.flake8-quotes]
inline-quotes = "double"
multiline-quotes = "double"
docstring-quotes = "double"

# ---------- BLACK ----------
[tool.black]
line-length = 88
target-version = ["py310"]

# ---------- ISORT ----------
[tool.isort]
profile = "black"
line_length = 88
src_paths = ["superbot/src"]

# ---------- MYPY ----------
[tool.mypy]
python_version = "3.10"
ignore_missing_imports = true      # discord.py / asyncpg have no bundled stubs
allow_untyped_defs = true          # codebase lacks full annotations
strict_optional = false
explicit_package_bases = true      # avoid duplicate-module errors under disbot/
# discord.py uses metaclass kwargs (title=, name=) that mypy can't see through
disable_error_codes = ["call-arg", "index", "call-overload"]
exclude = ["^\\.github/", "^tests/", "^venv/", "^env/", "^build/", "^dist/"]
