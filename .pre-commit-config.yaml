repos:
  # Architecture layer-boundary check — hard fail on new violations
  - repo: local
    hooks:
      - id: check-architecture
        name: SuperBot architecture check
        language: python
        entry: python scripts/check_architecture.py --mode strict
        types: [python]
        pass_filenames: true
        files: ^disbot/

  # Formatter / linter versions are PINNED to match the CI workflow
  # (.github/workflows/code-quality.yml) and requirements-dev.txt exactly.
  # Ruff changes its output between releases, so a stale pin here reformats
  # code in a way CI then rejects (and vice versa). When bumping ruff, bump it
  # in all three places in the same change (scripts/check_tool_pins.py guards it).

  # Ruff — format + lint + import-sort (replaced black + isort, A3 2026-07-06).
  # ruff-format owns formatting (Black-compatible); ruff (with the `I` rule) owns
  # import sorting + lint and fails the commit if it had to fix anything.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.21
    hooks:
      - id: ruff-format
      - id: ruff
        args: ["--fix", "--exit-non-zero-on-fix"]

  # Mypy - strict types
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.3.0
    hooks:
      - id: mypy
        additional_dependencies: ["types-requests", "types-PyYAML"]

# Match PythonAnywhere
default_language_version:
  python: python3.10
