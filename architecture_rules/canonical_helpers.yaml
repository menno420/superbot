# Canonical helper rules for SuperBot.
#
# Defines which modules/classes must be used for common operations.
# Deviations are flagged by check_architecture.py.

settings_keys:
  description: >
    All settings key constants must be imported from utils.settings_keys.
    Passing raw string literals to db.get_setting() bypasses the registry
    and makes key renames dangerous.
  # Regex checked by check_architecture.py (check_settings_key_literals).
  # Pattern: get_setting(anything, "literal_key") or get_setting(anything, 'literal_key')
  severity: warning
  allowed_in:
    - utils/settings_keys/
    - tests/

base_view:
  description: >
    Discord UI views must extend BaseView (views/base.py), HubView, or
    PersistentView (core/runtime/persistent_views.py).
    Extending discord.ui.View directly is allowed only for views that require
    specialized timeout/lifecycle ownership (documented in views/base.py).
    A justified direct extension is documented with a comment right above the
    class carrying the in-tree convention phrase
    "Extends discord.ui.View directly (not BaseView): <reason>" — the checker
    recognizes that comment and stops warning (so documented views converge
    instead of warning forever).
  canonical_class: BaseView
  canonical_module: views.base
  severity: warning
  # Directories where direct discord.ui.View use is documented and expected.
  exemptions:
    - pattern: views/rps/
      reason: RPS game views require tight gameplay lifecycle coupling
    - pattern: views/blackjack/
      reason: Blackjack views require specialized timeout and state cleanup
    - pattern: views/casino/
      reason: >
        Casino table views (multiplayer poker) own a per-player ephemeral
        broadcast + per-turn idle clock lifecycle — the same game-state
        lifecycle ownership as blackjack/rps, beyond BaseView.
    - pattern: views/fishing/
      reason: >
        Fishing minigame views drive a timed cast/bite/reel lifecycle (a managed
        background task arms the bite, the reel button resolves against a window)
        — the same game-state lifecycle ownership as blackjack, beyond BaseView.
    - pattern: views/games/
      reason: General game views with specialized lifecycle ownership
    - pattern: views/ai/
      reason: >
        AI multi-step selection views use chained select menus that require
        fine-grained interaction lifecycle control beyond what BaseView provides.

audit_events:
  description: >
    Auditable mutations must emit through services.audit_events.emit_audit_action().
    Direct writes without audit emission bypass the audit trail.
  canonical_module: services.audit_events
  canonical_function: emit_audit_action
  severity: warning
  # Not yet automatically checked — tracked here for documentation.
  auto_checked: false

no_dead_end:
  # Friction->guard (Q-0194) for the recurring "trapped-view" bug class — a finished
  # game/duel that leaves disabled buttons and stop()s without swapping to a nav-carrying
  # result view (Fishing #1521, Deathmatch + RPS PvP #1527 / BUG-0028). Heuristic AST lint,
  # so it ships warning-tier with an allowlist (same shape as base_view above) and is
  # disposable per the adopt-freely-with-a-kill-switch rule (Q-0105) — if the heuristic
  # proves noisy across a few sessions, delete this block + check_no_dead_end_terminal_views.
  description: >
    A game-view terminal handler (a method that calls self.stop()) which renders a terminal
    message should swap to a view that carries standard navigation (a result view / a Back
    button) rather than re-render the now-disabled self or post a bare embed with no view.
    The checker flags a handler that stop()s and renders a message but neither constructs a
    *View nor delegates to another coroutine (which may render the swap elsewhere).
  severity: warning
  # Only game-view directories are scoped (these own gameplay terminal lifecycles).
  game_dirs:
    - views/rps/
    - views/blackjack/
    - views/casino/
    - views/fishing/
    - views/games/
  # Accepted terminal handlers — keyed by ClassName.method. Pre-game challenge *invites*
  # that were declined / timed out never became a game, so there is no result to navigate;
  # closing with terminal copy + disabled buttons is correct, not a dead-end.
  exemptions:
    - view: _ChallengeView
      method: decline
      reason: pre-game blackjack PvP invite declined — no game result to navigate
    - view: _ChallengeView
      method: on_timeout
      reason: pre-game blackjack PvP invite expired — no game result to navigate
    - view: _RpsPvpChallengeView
      method: decline
      reason: pre-game RPS PvP invite declined — no game result to navigate
    - view: _RpsPvpChallengeView
      method: on_timeout
      reason: pre-game RPS PvP invite expired — no game result to navigate
