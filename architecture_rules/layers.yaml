# Layer boundary rules for SuperBot.
#
# Based on the binding architecture contract in docs/architecture.md.
#
# IMPORTANT: Only MODULE-LEVEL imports are checked. Lazy function-body
# imports (from X import Y inside a def) are allowed throughout the
# codebase to avoid circular import problems — these are NOT flagged.
#
# TYPE_CHECKING-guarded imports are also exempt when type_checking_exempt
# is true for the layer (they create no runtime dependency).
#
# Canonical allowed import directions (from docs/architecture.md §Ownership):
#   cogs       → services, core, views, governance, utils
#   views      → services, core, utils (NOT cogs)
#   services   → utils, core/events   (NOT views, NOT cogs)
#   governance → utils, core          (NOT services — uses writes.py pipeline)
#   core       → utils                (NOT services, NOT cogs — per arch doc)
#   utils      → stdlib, discord      (NOT services, NOT core, NOT cogs)
#   utils/db   → asyncpg only         (NOT anything in project layers)

layers:
  utils:
    description: Pure helpers — no I/O. stdlib and discord only.
    path_prefix: utils
    may_import: []
    type_checking_exempt: true
    # utils/db/ is a subdirectory; its stricter rule (no project imports) is
    # covered by the same empty may_import list.

  core:
    description: Platform primitives — session, anchor, router, EventBus, scheduler.
    path_prefix: core
    may_import: [utils]
    type_checking_exempt: true
    # core/runtime must NOT import services or cogs at module level.

  governance:
    description: Per-guild visibility and cleanup policy engine.
    path_prefix: governance
    may_import: [utils, core]
    type_checking_exempt: true

  services:
    description: Audited cross-subsystem mutation paths.
    path_prefix: services
    may_import: [utils, core, services, governance]
    type_checking_exempt: true
    # services must NOT import views or cogs at module level — ever.

  views:
    description: Reusable Discord UI components.
    path_prefix: views
    may_import: [utils, core, services, views]
    type_checking_exempt: true
    # views must NOT import cogs.

  cogs:
    description: Discord command handlers and event listeners (top layer).
    path_prefix: cogs
    may_import: [utils, core, services, views, governance, cogs]
    type_checking_exempt: true


# Known module-level violations tracked for follow-up, reported as WARN.
known_violations:
  # services → views (the core rule being enforced)
  - file: services/cleanup_profiles.py
    import: views.setup.scan_panel
    reason: >
      classify_channel_name() lives in views but is needed by this service.
      Fix: move the function to services/ or utils/.
    ticket: arch-fix-1

  - file: services/cog_routing_profiles.py
    import: views.setup.scan_panel
    reason: Same — classify_channel_name() misplaced in views layer.
    ticket: arch-fix-1

  - file: services/channel_recommender.py
    import: views.setup.scan_panel
    reason: Same — classify_channel_name() misplaced in views layer.
    ticket: arch-fix-1

  # services → cogs
  - file: services/automation_executor.py
    import: cogs.diagnostic._platform_embeds
    reason: >
      Diagnostic embed helper imported directly from a cog's internal module.
      Fix: move to utils/ or services/.
    ticket: arch-fix-5

  # utils → core / services (known violations in heavily-integrated utils)
  - file: utils/db/pool.py
    import: core.runtime
    reason: >
      pool.py imports slow_path_log for query timing. Should use a utils-level
      hook instead of importing core directly.
    ticket: arch-fix-6

  - file: utils/db/pool.py
    import: services
    reason: pool.py imports metrics service for instrumentation.
    ticket: arch-fix-6

  - file: utils/guild_config_accessors.py
    import: core.runtime
    reason: Accessor imports config_arbitration to resolve runtime config.
    ticket: arch-fix-7

  - file: utils/helpers.py
    import: core.runtime
    reason: helpers.py imports config_arbitration at module level.
    ticket: arch-fix-7

  - file: utils/hub_registry.py
