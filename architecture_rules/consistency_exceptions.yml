# Allowlist for scripts/check_consistency.py (the UX-consistency linter, Q-0170).
#
# This is the ONLY valid way to bypass a consistency rule — never suppress the
# check itself. Each rule has an `exceptions:` list; an entry is a `pattern`
# (a `views/...py` path matched as a prefix, optionally `::Class.method` to scope
# it to one callback) plus a `reason`.
#
# Keep entries genuine: an exception documents a callback whose new ephemeral
# message is correct (a real new message — a DM, a confirmation toast that should
# NOT replace the panel), not a way to mute a real inconsistency that should be
# fixed to edit in place.

edit_in_place:
  exceptions: []

# select_option_truncation: a `views/...py` path prefix whose front-truncating
# slice is a *genuine* top-N display (an error message intentionally listing only
# the first few of many), NOT a select that should paginate. Fix real selects to
# paginate (see `views/setup/sections/cog_routing.py` `_CogPickView`) — only
# allowlist a deliberate display truncation.
select_option_truncation:
  exceptions:
    # --- Embed / text displays, NOT selects (the slice feeds an embed field or
    #     a text block; the file is flagged only because it also builds selects).
    #     Scoped by ::qualname so the file's real selects stay checked. ---
    - pattern: views/btd6/leaderboard_browser_view.py::build_event_list_embed
      reason: "items[:10] is a top-10 leaderboard embed field, not a select."
    - pattern: views/btd6/live_events_view.py::build_event_list_embed
      reason: "items[:10] is a live-events embed field, not a select."
    - pattern: views/btd6/paragon_view.py::build_error_embed
      reason: "valid_towers[:8] is an error-message hint list, not a select."
    - pattern: views/diagnostic/automation_panel.py::_build_panel_embed
      reason: "rules[:25] feeds an embed rule-line summary, not a select."
    - pattern: views/channels/visibility_panel.py::_SubsystemToggleView._rebuild_buttons
      reason: "visible_subsystems[:20] caps the toggle *button* grid (4 rows×5), not a select; the file's channel picker is windowed via attach_multi_select."
    - pattern: views/mining/workshop_panel.py::build_workshop_embed
      reason: "ready[:12] is a craftables embed display, not a select."
    - pattern: views/setup/sections/preset_select.py::build_preview_embed
      reason: "preview.operations[:10] is an op-preview embed list, not a select."
    - pattern: views/ux_lab/compare.py::CompareView.build
      reason: "render_pattern_preview(...)[:8] is a preview-embed slice, not a select."
    - pattern: views/ux_lab/layout_v2.py::LayoutWingView._build_gallery
      reason: "_AVATARS[:4] is a fixed demo avatar gallery (UX lab)."
    # --- Bounded fixed-catalog selects: the option source is an in-repo catalog
    #     that cannot realistically exceed 25; the [:25] slice is defensive. ---
    - pattern: views/btd6/paragon_view.py::_ParagonSelect
      reason: "PARAGONS is the full ~10-entry paragon catalog; cannot exceed 25."
    - pattern: views/btd6/hero_browser_view.py::_HeroSelect
      reason: "BTD6 hero roster (~16); bounded well under 25."
    - pattern: views/btd6/hero_stats_view.py::_LevelSelect
      reason: "Hero levels (≤20); bounded under 25."
    - pattern: views/btd6/paragon_stats_view.py::_DegreeSelect
      reason: "12 fixed degree milestones; an 'Enter degree' modal covers any 1..100 in between."
    - pattern: views/btd6/tower_stats_view.py::_CrosspathSelect
      reason: "A tower's crosspath codes are a bounded set well under 25."
    - pattern: views/btd6/tower_stats_view.py::_TierSelect
      reason: "Upgrade tiers per path (≤6); bounded under 25."
    - pattern: views/btd6/leaderboard_browser_view.py::_EventSelect
      reason: "Event kinds are a small fixed enum; bounded under 25."
    - pattern: views/btd6/admin_panel.py::BTD6AdminView.create
      reason: "keys[:25] parent-chain select with a 'Fetch All' fallback that covers every chain (documented)."
    - pattern: views/setup/template_picker.py::_select_options
      reason: "14 onboarding/server-pulse TEMPLATES; documented-defensive slice."
    - pattern: views/setup/wizard.py::_JumpToSectionSelect
      reason: "wizard.sections is the fixed setup-section registry (~10); cannot exceed 25."
    - pattern: views/ux_lab/selects.py::SelectsWingView._ex_search_modal
      reason: "_FAKE_ITEMS is a fixed UX-lab demo fixture."
    - pattern: views/ux_lab/compare.py::CompareView._rebuild_items
      reason: "specs_for(category) is the curated UX-lab pattern set; bounded under 25."
    # --- BTD6 game-data rosters + the live-events feed: fixed/derived from the
    #     pinned BTD6 dataset, bounded well under 25 (same standard as the btd6
    #     paragon/hero/tower entries above). ---
    - pattern: views/btd6/tower_browser_view.py::_TowerSelect.__init__
      reason: "BTD6 base-tower roster (~23 towers); fixed game data, bounded under 25."
    - pattern: views/btd6/live_events_view.py::_LiveOverviewSelect.__init__
      reason: "Concurrent live BTD6 events are a small handful (race/boss/CT/odyssey); bounded feed."
    - pattern: views/btd6/live_events_view.py::_EventSelect.__init__
      reason: "Concurrent live BTD6 events are a small handful; bounded feed, not the #1040 class."
    # --- Mining curated economy (Q-0075): every option source is a fixed in-repo
    #     taxonomy / recipe catalog or one category's bounded slice of it. ---
    - pattern: views/mining/market_panel.py::_CategorySelect.__init__
      reason: "taxonomy.ordered_categories — the fixed mining item-category set (~10); bounded under 25."
    - pattern: views/mining/market_panel.py::_TypeSelect.__init__
      reason: "types within one curated category; bounded under 25."
    - pattern: views/mining/market_panel.py::_BuySelect.__init__
      reason: "variants of one curated base type; bounded under 25."
    - pattern: views/mining/recipe_browser.py::_CategorySelect.__init__
      reason: "fixed recipe-category catalog; bounded under 25."
    - pattern: views/mining/recipe_browser.py::_TypeSelect.__init__
      reason: "types within one recipe category; bounded under 25."
    - pattern: views/mining/recipe_browser.py::_VariantSelect.__init__
      reason: "variants of one curated recipe type; bounded under 25."
    - pattern: views/mining/workshop_panel.py::MiningWorkshopView.create
      reason: "repair/craft selects are bounded by the curated gear+recipe catalog; under 25."
    - pattern: views/mining/gear_panel.py::_ItemSelect.__init__
      reason: "owned items in one slot, bounded by the curated per-slot gear catalog; under 25 (24 + unequip sentinel)."

# panel_base_class: a view extending `discord.ui.View` directly outside the
# rps/blackjack/games/ai path lanes. These entries MIRROR the arch checker's
# already-decided ground truth — the 8-entry frozenset in
# tests/unit/views/test_view_base_class_conformance.py (the `baseview_inheritance`
# ratchet). They are NOT new debt to migrate: each is a documented
# specialized-lifecycle direct subclass (ephemeral capability/pipeline-gated
# follow-ups with no local interaction_check/on_timeout; bespoke admin checks;
# inline paginators). The conformance test is the single ratchet that drives them
# down "only with a concrete gain"; allowlisting here keeps the warn-only
# consistency rule from re-flagging them (Q-0120: a verdict that fights documented
# ground truth is the tool's false positive). When the conformance frozenset
# shrinks, drop the matching entry here too.
panel_base_class:
  exceptions:
    - pattern: views/btd6/admin_panel.py::BTD6AdminView
      reason: "Documented arch exception (conformance frozenset): bespoke BTD6 admin checks."
    - pattern: views/btd6/strategy_review.py::StrategyReviewView
      reason: "Documented arch exception (conformance frozenset): bespoke BTD6 admin lifecycle."
    - pattern: views/channels/list_panel.py::_ChannelListPaginatorView
      reason: "Documented arch exception (conformance frozenset): ephemeral inline `!list` paginator with its own author interaction_check + on_timeout."
    - pattern: views/settings/edit_channel.py::ChannelSettingSelectView
      reason: "Documented arch exception (conformance frozenset): ephemeral capability/pipeline-gated edit follow-up; BaseView adds no concrete gain on an ephemeral."
    - pattern: views/settings/edit_number_presets.py::NumericPresetsView
      reason: "Documented arch exception (conformance frozenset): ephemeral capability/pipeline-gated edit follow-up; BaseView adds no concrete gain on an ephemeral."
    - pattern: views/settings/edit_role.py::RoleSettingSelectView
      reason: "Documented arch exception (conformance frozenset): ephemeral capability/pipeline-gated edit follow-up; BaseView adds no concrete gain on an ephemeral."
    - pattern: views/setup/launcher.py::SetupLauncherView
      reason: "Documented arch exception (conformance frozenset): setup launcher with specialized lifecycle."
    - pattern: views/xp/rank_view.py::_RankView
      reason: "Documented arch exception (conformance frozenset): documented direct-subclass reason in the module."
