# Allowlist for scripts/check_consistency.py (the UX-consistency linter, Q-0170).
#
# This is the ONLY valid way to bypass a consistency rule — never suppress the
# check itself. Each rule has an `exceptions:` list; an entry is a `pattern`
# (a `views/...py` path matched as a prefix, optionally `::Class.method` to scope
# it to one callback) plus a `reason`.
#
# Keep entries genuine: an exception documents a callback whose new ephemeral
# message is correct (a real new message — a DM, a confirmation toast that should
# NOT replace the panel), not a way to mute a real inconsistency that should be
# fixed to edit in place.

edit_in_place:
  # Triaged 2026-06-19. The remaining (non-allowlisted) findings are the entire
  # `views/ai/` family — the owner's documented "AI panels stack ephemerals
  # instead of updating in place" inconsistency, tracked by
  # `docs/ideas/ai-panel-inplace-navigation-2026-06-11.md`. Those are deliberately
  # NOT allowlisted: they are the real bug the rule exists to catch, and the rule
  # stays warn-only until that redesign ships. Each entry below documents a
  # callback whose new ephemeral message is genuinely correct.
  exceptions:
    # --- Opens an interactive sub-flow (a fresh picker / builder / sub-panel
    #     the operator drives next); the parent panel re-renders in place on
    #     completion. A new ephemeral message is the correct carrier here. ---
    - pattern: views/roles/management_panel.py::ManagementPanel.delete_btn
      reason: "Opens the role-delete picker; the parent panel re-renders in place after the delete (PaginatedSelectView callback)."
    - pattern: views/roles/time_roles_panel.py::TimeRolesPanel.add_btn
      reason: "Opens the role picker -> days modal; the panel re-renders in place via _rerender on submit."
    - pattern: views/roles/time_roles_panel.py::TimeRolesPanel.remove_btn
      reason: "Opens the remove picker; the panel re-renders in place via _rerender after removal."
    - pattern: views/roles/xp_roles_panel.py::XpRolesPanel.add_btn
      reason: "Opens the role picker -> level modal; the panel re-renders in place via _rerender on submit."
    - pattern: views/roles/xp_roles_panel.py::XpRolesPanel.remove_btn
      reason: "Opens the remove picker; the panel re-renders in place via _rerender after removal."
    - pattern: views/cleanup/policy_panel.py::CleanupPolicyPanelView.btn_build
      reason: "Opens the scope-select policy builder sub-flow (the sibling btn_refresh edits the panel in place)."
    - pattern: views/cleanup/policy_panel.py::CleanupPolicyPanelView.btn_remove
      reason: "Sibling of the allowlisted btn_build; opens the admin-gated remove-policy select sub-flow as an ephemeral (the in-place edit happens at _RemoveSelect.callback; the sibling btn_refresh edits the panel in place)."
    # Ultracode roles fleet (U2, 2026-06-23): the roles-hub picker/builder buttons —
    # each opens a transient sub-picker ephemeral that folds back into the parent
    # panel/draft via _rerender on completion (the same idiom as delete_btn /
    # time_roles add_btn above). Forcing edit_message would destroy the operator's
    # builder/draft context. Source-verified against the matching siblings.
    - pattern: views/roles/creation_panel.py::RoleCreatePanel.packs_btn
      reason: "Opens the RolePackView bulk-create sub-flow; created roles fold back into the create panel (same idiom as the allowlisted role pickers)."
    - pattern: views/roles/management_panel.py::ManagementPanel.edit_btn
      reason: "Opens the _EditRolePickView -> edit modal; the panel re-renders in place via _rerender on submit (sibling of delete_btn)."
    - pattern: views/roles/reaction_panel.py::ReactionRolesPanel.add_btn
      reason: "Opens the _AddSourceView add-binding sub-flow (pick message -> emoji -> role); the panel re-renders on completion."
    - pattern: views/roles/reaction_panel.py::ReactionRolesPanel.remove_btn
      reason: "Opens a PaginatedSelectView binding picker; _do_remove re-renders the panel in place (sibling of delete_btn)."
    - pattern: views/roles/reaction_panel.py::ReactionRolesPanel.mode_btn
      reason: "Opens a PaginatedSelectView mode picker; the selection chains the panel forward via edit_message."
    - pattern: views/roles/role_menu_builder.py::RoleMenuBuilder.roles_btn
      reason: "Opens the _RolePickView role picker; the chosen roles fold into the menu draft via _rerender (the builder's own style_btn/post_btn edit in place and are not flagged)."
    - pattern: views/roles/role_menu_builder.py::RoleMenuBuilder.colours_btn
      reason: "Opens the _ColourRolesView preset/custom-colour picker; created roles fold into the draft via _rerender."
    - pattern: views/roles/role_menu_builder.py::RoleMenuBuilder.packs_btn
      reason: "Opens RolePackView(on_created=_add_pack_roles); the created pack roles fold into the draft via _rerender."
    - pattern: views/roles/role_menu_builder.py::RoleMenuBuilder.template_btn
      reason: "Opens a PaginatedSelectView template picker; _apply_template folds the template into the draft via _rerender."
    - pattern: views/roles/role_menu_builder.py::RoleMenuBuilder.advanced_btn
      reason: "Opens the _AdvancedView sub-panel (the folded Theme/Card/Counts/Mode/Limit controls); its controls fold into the draft via _rerender (lean layout, tools/sim/role_menu_layout_sim.py)."
    - pattern: views/roles/role_menu_builder.py::_AdvancedView.theme_btn
      reason: "Opens a PaginatedSelectView theme picker; _apply_theme folds the theme into the draft via the builder's _rerender."
    - pattern: views/roles/role_menu_builder.py::_AdvancedView.mode_btn
      reason: "Opens a PaginatedSelectView mode picker; _apply_mode folds the mode into the draft via the builder's _rerender."
    - pattern: views/roles/role_menu_builder.py::_AdvancedView.card_btn
      reason: "Opens the _CardPickView banner picker; the chosen card applies to the draft via the builder's _rerender."
    - pattern: views/roles/role_menu_builder.py::RoleMenuBuilder.channel_btn
      reason: "Opens the _ChannelPickView channel picker; the chosen channel applies to the draft via _rerender."
    - pattern: views/server_management/hub.py::ServerManagementHubView.help_editor_btn
      reason: "Persistent shared hub message opens the admin-private Help editor as an ephemeral sub-flow (can't edit a shared persistent message per-user)."
    # --- Persistent / shared-anchor views: the message is shared across users or
    #     survives restarts, so editing it in place per-click is wrong. ---
    - pattern: views/setup/launcher.py::SetupLauncherView
      reason: "Persistent shared launcher message; every button opens an admin-private ephemeral sub-flow / report (start wizard, readiness scan, suggestions, preset, summary). Editing the shared launcher per-user is wrong."
    - pattern: views/ux_lab/persistent_demo.py::UxLabPersistentDemo.ping
      reason: "The ephemeral 'still alive' reply IS the PersistentView restart-survival demo; a new message is the exhibit's point."
    # --- Shared multiplayer lobby / match messages: the view is posted into a
    #     channel for many players; a per-user ephemeral confirm is correct, and
    #     the shared embed updates via its own helper. ---
    - pattern: views/rps/registration.py::_RpsRegistrationView.join_btn
      reason: "Shared tournament-lobby join button; each clicker gets a private ephemeral confirm (editing the public lobby message would change it for everyone)."
    - pattern: views/rps/pvp_play.py::_RpsPvpPlayView.pick
      reason: "Shared PvP match message; opens each player's private move picker as an ephemeral (the public match message must not change)."
    - pattern: views/blackjack/tournament_views.py::_TournRegistrationView.join_btn
      reason: "Shared tournament-lobby join; per-user ephemeral confirm + the lobby embed updates via _update_tourn_embed (not this message's view)."
    - pattern: views/casino/hub.py::CasinoHubView.new_poker
      reason: "Opens a shared public poker table via poker_table.launch_table (channel.send -> PokerLobbyView); the per-user ephemeral confirms and points at the public lobby. Editing the casino hub in place would lose the shared lobby (same pattern as the rps/blackjack join_btn entries above)."
    # --- Disabled "coming soon" placeholder: the button can never fire. ---
    - pattern: views/casino/hub.py::CasinoHubView.roulette
      reason: "Permanently disabled placeholder (disabled=True, # pragma: no cover); the 'coming soon' ephemeral can never fire and there is no panel to swap to."
    # --- In-place via a module-level helper; the ephemeral is a fallback. ---
    - pattern: views/channels/create_panel.py::_CreateSubView.create_btn
      reason: "Restores the parent manager panel in place via restore_parent_or_send_fresh; the ephemeral send is only the parent-message-gone fallback."
    # --- Terminal / advisory report toasts: a one-shot action result or an
    #     advisory report whose content does not belong on the panel. ---
    - pattern: views/roles/diagnostics_panel.py::DiagnosticsPanel.run_btn
      reason: "One-shot role-assignment run report; the panel lists configured thresholds, not run results, so a toast is the correct carrier."
    - pattern: views/roles/time_roles_panel.py::TimeRolesPanel.run_btn
      reason: "One-shot role-assignment run report; the panel lists thresholds, unchanged by a run."
    - pattern: views/roles/management_panel.py::_ConfirmDeleteView.confirm
      reason: "Per-role delete report toast (followup.send) after applying the deletions; the parent management panel re-renders in place via _rerender (same idiom as diagnostics run_btn)."
    - pattern: views/setup/final_review.py::FinalReviewView._ai_review
      reason: "Supplementary advisory AI review ('nothing staged or applied'); the Final Review panel is itself an ephemeral follow-up over the wizard anchor."
    - pattern: views/setup/template_picker.py::TemplateConfigView._apply
      reason: "Terminal apply-outcome report after installing the template (the config view's job is done)."
    - pattern: views/setup/template_picker.py::TemplateConfigView._cancel
      reason: "Terminal 'cancelled — not installed' confirmation toast."
    - pattern: views/fishing/menu.py::FishingMenuView.rules_btn
      reason: "Read-only ephemeral 'how to fish' help card (mirrors the blackjack rules button); the menu panel is unchanged by viewing it — a genuine new message, not a panel re-render."
    - pattern: views/creature/menu.py::CreatureMenuView.rules_btn
      reason: "Read-only ephemeral 'how to play Creatures' help card (mirrors the fishing/blackjack rules buttons); the menu panel is unchanged by viewing it — a genuine new message, not a panel re-render."
    - pattern: views/tickets/hub.py::TicketHubView.list_btn
      reason: "Read-only ephemeral list of the caller's own open tickets; the hub panel is unchanged by viewing it (a genuine new message, not a panel re-render)."
    - pattern: views/tickets/hub.py::TicketHubView.post_panel_btn
      reason: "Posts the public launcher panel into the channel + an ephemeral confirmation toast; the hub panel itself is unchanged (a genuine new message)."

# back_button: a HubView whose module references no back/nav affordance. The rule
# covers BOTH decorated (@ui.button) and dynamically-added (add_item) hubs — the
# latter since 2026-06-20, closing the gap that let the Explore world-hub dead-end
# ship. Detection recognizes: attach_back*/chain_back, transition_to(...), a
# back-token label/custom_id/emoji on any call (so custom back-button subclasses
# like _BackToHubButton count), and back-labelled @ui.button callbacks. Triaged:
# every current finding is a top-of-stack ROOT panel — opened directly by a cog
# command (no parent), OR a child whose PARENT attaches the back externally. The
# rule's real target is a *child* sub-panel with NO back anywhere; it still catches
# a future one (allowlists are scoped per class). Re-verify before allowlisting a
# new one: if it is opened FROM another panel and nothing attaches a back, it needs
# a back button (fix it), not an allowlist entry.
back_button:
  exceptions:
    - pattern: views/access/explorer.py::AccessExplorerView
      reason: "Root access-explorer panel opened directly by the settings cog command (send_panel); no parent to return to."
    - pattern: views/channels/main_panel.py::_ChannelManagerView
      reason: "Root of the channels navigation stack — its sub-panels (create/delete/visibility/move) restore back TO it; it has no parent itself."
    - pattern: views/cleanup/policy_panel.py::CleanupPolicyPanelView
      reason: "Root cleanup-policy panel opened directly by the cleanup cog command; no parent to return to."
    - pattern: views/casino/hub.py::CasinoHubView
      reason: "Root `!casino` panel; opened as a `!help`/Games-hub child the parent attaches back externally (attach_back_to_games_button). No parent on the root open."
    - pattern: views/counting/hub_panel.py::_CountingHubView
      reason: "Root `!countingmenu` panel; opened as a `!help`/Games-hub child the parent attaches back externally (HelpCategoryView / attach_back_to_games_button). No parent on the root open."
    - pattern: views/diagnostic/automation_panel.py::AutomationPanelView
      reason: "Root `!platform automation` panel opened via open_panel from the platform command group (not a child of the diagnostics/platform hub); no parent."
    - pattern: views/diagnostic/hub_panel.py::_DiagnosticsHubView
      reason: "Root diagnostics hub opened directly by the diagnostic cog command; top of its stack."
    - pattern: views/explore/world_hub.py::ExploreWorldHubView
      reason: "Root `!world` panel; opened as a Mining-hub child the opener attaches '↩ Mining Hub' externally (views/mining/main_panel.py explore_btn). No parent on the root open."
    - pattern: views/fishing/menu.py::FishingMenuView
      reason: "Root `!fishing` panel; opened as a `!help`/Games-hub child the parent attaches back externally (HelpCategoryView). No parent on the root open; its Cast/Rod sub-screens take over the message rather than nest."
    - pattern: views/games/deathmatch_panel.py::DeathmatchPanelView
      reason: "Root deathmatch game panel opened directly by the deathmatch cog command; no parent."
    - pattern: views/settings/hub.py::SettingsHubView
      reason: "Root settings hub opened directly by the settings cog command; opened as a `!help` child the parent attaches back externally. Top of its own stack (its sub-panels return TO it via _BackToHubButton)."
    - pattern: views/treasury/menu.py::TreasuryView
      reason: "Root `!treasury` panel; opened as a `!help`/Economy-hub child the parent attaches back externally (HelpCategoryView). No parent on the root open; its Contribute action is a modal that takes over rather than nesting a sub-panel."
    - pattern: views/ux_lab/home.py::UxLabHomeView
      reason: "Root UX-lab gallery home opened directly by the ux_lab cog command; its wings/compare/probes return here via transition_to. No parent."
    - pattern: views/xp/main_panel.py::_XpHubView
      reason: "Root XP hub opened directly by the xp cog command; top of its stack."

# select_option_truncation: a `views/...py` path prefix whose front-truncating
# slice is a *genuine* top-N display (an error message intentionally listing only
# the first few of many), NOT a select that should paginate. Fix real selects to
# paginate (see `views/setup/sections/cog_routing.py` `_CogPickView`) — only
# allowlist a deliberate display truncation.
select_option_truncation:
  exceptions:
    # --- Embed / text displays, NOT selects (the slice feeds an embed field or
    #     a text block; the file is flagged only because it also builds selects).
    #     Scoped by ::qualname so the file's real selects stay checked. ---
    - pattern: views/btd6/leaderboard_browser_view.py::build_event_list_embed
      reason: "items[:10] is a top-10 leaderboard embed field, not a select."
    - pattern: views/btd6/live_events_view.py::build_event_list_embed
      reason: "items[:10] is a live-events embed field, not a select."
    - pattern: views/btd6/paragon_view.py::build_error_embed
      reason: "valid_towers[:8] is an error-message hint list, not a select."
    - pattern: views/diagnostic/automation_panel.py::_build_panel_embed
      reason: "rules[:25] feeds an embed rule-line summary, not a select."
    - pattern: views/channels/visibility_panel.py::_SubsystemToggleView._rebuild_buttons
      reason: "visible_subsystems[:20] caps the toggle *button* grid (4 rows×5), not a select; the file's channel picker is windowed via attach_multi_select."
    - pattern: views/mining/workshop_panel.py::build_workshop_embed
      reason: "ready[:12] is a craftables embed display, not a select."
    - pattern: views/setup/sections/preset_select.py::build_preview_embed
      reason: "preview.operations[:10] is an op-preview embed list, not a select."
    - pattern: views/ux_lab/compare.py::CompareView.build
      reason: "render_pattern_preview(...)[:8] is a preview-embed slice, not a select."
    - pattern: views/ux_lab/layout_v2.py::LayoutWingView._build_gallery
      reason: "_AVATARS[:4] is a fixed demo avatar gallery (UX lab)."
    - pattern: cogs/inventory_cog.py::UnifiedInventoryView.build_hub_embed
      reason: "items[:3] is the hub embed's per-category top-3 preview (with an explicit '+N more' overflow note), not a select; the file is flagged only because _CategoryView now also builds a type-filter select."
    - pattern: views/xp/import_panel.py::XpImportView.build_embed
      reason: "unresolved_names[:10] is a top-10 embed list of unmatched names (with an explicit '+N more' overflow), not a select; the file is flagged only because XpImportSetupView now also builds selects."
    # --- Bounded fixed-catalog selects: the option source is an in-repo catalog
    #     that cannot realistically exceed 25; the [:25] slice is defensive. ---
    - pattern: views/btd6/paragon_view.py::_ParagonSelect
      reason: "PARAGONS is the full ~10-entry paragon catalog; cannot exceed 25."
    - pattern: views/btd6/hero_browser_view.py::_HeroSelect
      reason: "BTD6 hero roster (~16); bounded well under 25."
    - pattern: views/btd6/hero_stats_view.py::_LevelSelect
      reason: "Hero levels (≤20); bounded under 25."
    - pattern: views/btd6/paragon_stats_view.py::_DegreeSelect
      reason: "12 fixed degree milestones; an 'Enter degree' modal covers any 1..100 in between."
    - pattern: views/btd6/tower_stats_view.py::_CrosspathSelect
      reason: "A tower's crosspath codes are a bounded set well under 25."
    - pattern: views/btd6/tower_stats_view.py::_TierSelect
      reason: "Upgrade tiers per path (≤6); bounded under 25."
    - pattern: views/btd6/leaderboard_browser_view.py::_EventSelect
      reason: "Event kinds are a small fixed enum; bounded under 25."
    - pattern: views/btd6/admin_panel.py::BTD6AdminView.create
      reason: "keys[:25] parent-chain select with a 'Fetch All' fallback that covers every chain (documented)."
    - pattern: views/setup/template_picker.py::_select_options
      reason: "14 onboarding/server-pulse TEMPLATES; documented-defensive slice."
    - pattern: views/setup/wizard.py::_JumpToSectionSelect
      reason: "wizard.sections is the fixed setup-section registry (~10); cannot exceed 25."
    - pattern: views/ux_lab/selects.py::SelectsWingView._ex_search_modal
      reason: "_FAKE_ITEMS is a fixed UX-lab demo fixture."
    - pattern: views/ux_lab/compare.py::CompareView._rebuild_items
      reason: "specs_for(category) is the curated UX-lab pattern set; bounded under 25."
    # --- BTD6 game-data rosters + the live-events feed: fixed/derived from the
    #     pinned BTD6 dataset, bounded well under 25 (same standard as the btd6
    #     paragon/hero/tower entries above). ---
    - pattern: views/btd6/tower_browser_view.py::_TowerSelect.__init__
      reason: "BTD6 base-tower roster (~23 towers); fixed game data, bounded under 25."
    - pattern: views/btd6/live_events_view.py::_LiveOverviewSelect.__init__
      reason: "Concurrent live BTD6 events are a small handful (race/boss/CT/odyssey); bounded feed."
    - pattern: views/btd6/live_events_view.py::_EventSelect.__init__
      reason: "Concurrent live BTD6 events are a small handful; bounded feed, not the #1040 class."
    # --- Mining curated economy (Q-0075): every option source is a fixed in-repo
    #     taxonomy / recipe catalog or one category's bounded slice of it. ---
    - pattern: views/mining/market_panel.py::_CategorySelect.__init__
      reason: "taxonomy.ordered_categories — the fixed mining item-category set (~10); bounded under 25."
    - pattern: views/mining/market_panel.py::_TypeSelect.__init__
      reason: "types within one curated category; bounded under 25."
    - pattern: views/mining/market_panel.py::_BuySelect.__init__
      reason: "variants of one curated base type; bounded under 25."
    - pattern: views/mining/recipe_browser.py::_CategorySelect.__init__
      reason: "fixed recipe-category catalog; bounded under 25."
    - pattern: views/mining/recipe_browser.py::_TypeSelect.__init__
      reason: "types within one recipe category; bounded under 25."
    - pattern: views/mining/recipe_browser.py::_VariantSelect.__init__
      reason: "variants of one curated recipe type; bounded under 25."
    - pattern: views/mining/workshop_panel.py::MiningWorkshopView.create
      reason: "repair/craft selects are bounded by the curated gear+recipe catalog; under 25."
    - pattern: views/mining/gear_panel.py::_ItemSelect.__init__
      reason: "owned items in one slot, bounded by the curated per-slot gear catalog; under 25 (24 + unequip sentinel)."
    # --- Cog layer (rule 4 now scans `cogs/` too — BUG-0017). An embed top-N
    #     display in a module that ALSO builds a select, so the module-wide
    #     select-builder gate sweeps it in; scoped by ::qualname so the module's
    #     real select stays checked. ---
    - pattern: cogs/community_spotlight_cog.py::_build_main_embed
      reason: "top_xp[:3]/top_coins[:3] are top-3 leaderboard embed fields, not selects; the module's only real select (_GameSelect) is a fixed 4-game catalog."

# panel_base_class: a view extending `discord.ui.View` directly outside the
# rps/blackjack/games/ai path lanes. These entries MIRROR the arch checker's
# already-decided ground truth — the frozenset (13 entries: 8 views + 5 cogs,
# since the ratchet was extended to scan `cogs/` in #1163) in
# tests/unit/views/test_view_base_class_conformance.py (the `baseview_inheritance`
# ratchet). They are NOT new debt to migrate: each is a documented
# specialized-lifecycle direct subclass (ephemeral capability/pipeline-gated
# follow-ups with no local interaction_check/on_timeout; bespoke admin checks;
# inline paginators). The conformance test is the single ratchet that drives them
# down "only with a concrete gain"; allowlisting here keeps the warn-only
# consistency rule from re-flagging them (Q-0120: a verdict that fights documented
# ground truth is the tool's false positive). When the conformance frozenset
# shrinks, drop the matching entry here too — the two lists are pinned in lockstep
# by tests/unit/views/test_panel_base_class_allowlist_parity.py, which fails if
# they ever diverge.
panel_base_class:
  exceptions:
    - pattern: views/btd6/admin_panel.py::BTD6AdminView
      reason: "Documented arch exception (conformance frozenset): bespoke BTD6 admin checks."
    - pattern: views/btd6/strategy_review.py::StrategyReviewView
      reason: "Documented arch exception (conformance frozenset): bespoke BTD6 admin lifecycle."
    - pattern: views/channels/list_panel.py::_ChannelListPaginatorView
      reason: "Documented arch exception (conformance frozenset): ephemeral inline `!list` paginator with its own author interaction_check + on_timeout."
    - pattern: views/settings/edit_channel.py::ChannelSettingSelectView
      reason: "Documented arch exception (conformance frozenset): ephemeral capability/pipeline-gated edit follow-up; BaseView adds no concrete gain on an ephemeral."
    - pattern: views/settings/edit_number_presets.py::NumericPresetsView
      reason: "Documented arch exception (conformance frozenset): ephemeral capability/pipeline-gated edit follow-up; BaseView adds no concrete gain on an ephemeral."
    - pattern: views/settings/edit_role.py::RoleSettingSelectView
      reason: "Documented arch exception (conformance frozenset): ephemeral capability/pipeline-gated edit follow-up; BaseView adds no concrete gain on an ephemeral."
    - pattern: views/setup/launcher.py::SetupLauncherView
      reason: "Documented arch exception (conformance frozenset): setup launcher with specialized lifecycle."
    - pattern: views/xp/rank_view.py::_RankView
      reason: "Documented arch exception (conformance frozenset): documented direct-subclass reason in the module."
    # --- Cog layer (rule 3 now scans `cogs/` too — BUG-0017). These are NOT in
    #     the views/-scoped `baseview_inheritance` conformance frozenset above —
    #     they are cog-layer specialized-lifecycle direct subclasses, each with
    #     its own interaction_check / on_timeout / ephemeral self-stop lifecycle
    #     where BaseView adds no concrete gain (same standard as the views/ entries
    #     above). Documented per class; the rule now CATCHES any new cog-layer
    #     direct-View class, which must be migrated or consciously allowlisted. ---
    - pattern: cogs/deathmatch_cog.py::_DuelView
      reason: "Game-state duel view (the cog-layer counterpart of the views/games/ path exemption): own interaction_check + on_timeout + Attack/Defend turn lifecycle."
    - pattern: cogs/deathmatch_cog.py::_ChallengeView
      reason: "Game-state challenge view: own interaction_check + on_timeout + Accept/Decline lifecycle over a 30s challenge window."
    - pattern: cogs/logging/provision_view.py::LogChannelProvisionView
      reason: "Invoker-locked ephemeral preview-then-confirm view with its own lifecycle (self-stops after confirm); same class as the views/settings/edit_* ephemeral follow-ups, BaseView adds no concrete gain."
    - pattern: cogs/logging/select_view.py::LogChannelSelectView
      reason: "Invoker-locked ephemeral ChannelSelect+Clear view that self-stops after a successful interaction; ephemeral specialized lifecycle, BaseView adds no concrete gain."
    - pattern: cogs/settings_cog.py::_DisabledHelpHookView
      reason: "Intentionally empty no-controls container; the help cog appends its own '↩ Back to Help' button. A BaseView wrapper would change its deliberate empty-container semantics."
